<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrueText — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card glass">
      <div class="auth-brand">
        <div class="auth-logo">T</div>
        <h1>TrueText</h1>
      </div>
      <p class="subtitle">AI-generated text detection with explainable results, plagiarism screening, and instructor reporting.</p>

      <div class="tabs">
        <button id="tab-login" class="tab active">Sign In</button>
        <button id="tab-signup" class="tab">Create Account</button>
      </div>

      <form id="login-form">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Sign In</button>
      </form>

      <form id="signup-form" class="hidden">
        <input type="text" id="signup-username" placeholder="Username" required>
        <input type="email" id="signup-email" placeholder="Email" required>
        <input type="password" id="signup-password" placeholder="Password (min 6 characters)" required>
        <button type="submit">Create Account</button>
      </form>

      <p id="auth-error" class="error"></p>
    </div>
  </div>

  <script>
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const errorBox = document.getElementById('auth-error');

    tabLogin.onclick = () => { tabLogin.classList.add('active'); tabSignup.classList.remove('active');
      loginForm.classList.remove('hidden'); signupForm.classList.add('hidden'); errorBox.textContent=''; };
    tabSignup.onclick = () => { tabSignup.classList.add('active'); tabLogin.classList.remove('active');
      signupForm.classList.remove('hidden'); loginForm.classList.add('hidden'); errorBox.textContent=''; };

    async function handleAuth(url, body) {
      errorBox.textContent = '';
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { errorBox.textContent = data.error || 'Something went wrong'; return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = '/dashboard';
      } catch (e) {
        errorBox.textContent = 'Could not reach server. Is the Flask app running?';
      }
    }

    loginForm.onsubmit = (e) => {
      e.preventDefault();
      handleAuth('/api/login', {
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value
      });
    };

    signupForm.onsubmit = (e) => {
      e.preventDefault();
      handleAuth('/api/signup', {
        username: document.getElementById('signup-username').value,
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value
      });
    };
  </script>
</body>
</html>
